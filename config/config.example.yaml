# Graylog Threat Analyzer 設定檔
# 複製此檔為 config.yaml 並填入實際值
#
# ★ Graylog Custom HTTP Notification JMTE 模板建議補充欄位（加入 fields 區塊）：
#   "severity":          "${event.fields.Severity}",        # 影響 informational 判斷規則
#   "signature_name":    "${event.fields.Signature}",       # 完整 signature 文字名稱
#   "source_zone":       "${event.fields.FromZone}",
#   "destination_zone":  "${event.fields.ToZone}",
#   "rule_name":         "${event.fields.SecurityRule}",
#   "transport":         "${event.fields.Protocol}",
#   "direction":         "${event.fields.Direction}",
#   （欄位名稱視你的 Graylog pipeline rules 而定，請自行確認）

server:
  host: "0.0.0.0"
  port: 8000
  # Graylog webhook 驗證用 token（選填，建議設定）
  webhook_token: "your-secret-token-here"

graylog:
  # Graylog API 位址（用於 enrichment 查詢歷史事件）
  api_url: "http://YOUR_GRAYLOG_IP:9000/api"
  api_token: "your-graylog-api-token"
  # 查詢歷史事件的時間範圍（小時）
  lookback_hours: 24
  # Graylog stream 中的欄位名稱（用於 Search API 頻率查詢）
  # 預設值對應 PAN syslog 經 Graylog pipeline 處理後的欄位名稱
  field_source_ip: "source_ip"           # 來源 IP 欄位
  field_destination_ip: "destination_ip" # 目標 IP 欄位
  field_threat_id: "alert_signature"     # Threat ID / Signature 欄位

llm:
  # 內部 LLM API endpoint
  api_url: "http://your-llm-server:8080/v1/chat/completions"
  model: "your-model-name"
  temperature: 0.1
  max_tokens: 500
  # 請求逾時（秒）
  timeout: 30

smtp:
  host: "your-smtp-server"
  port: 25
  # 如需認證，填入以下欄位
  username: ""
  password: ""
  use_tls: false
  sender: "graylog-analyzer@example.com"
  recipients:
    - "security-team@example.com"

edl:
  # EDL 檔案輸出路徑（PA 會透過 HTTP 拉取）
  output_dir: "/var/www/edl"
  # 預設 TTL（天），過期自動移除
  default_ttl_days: 30

assets:
  # 資產清冊 CSV 路徑
  csv_path: "config/assets.csv"

known_fp:
  # 已知誤判清單 CSV 路徑
  csv_path: "config/known_fp.csv"
