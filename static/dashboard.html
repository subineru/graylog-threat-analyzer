<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sidebar-bg:#1e2d4a;
  --sidebar-hover:#253558;
  --sidebar-active:#2d4270;
  --sidebar-text:#a8bcd6;
  --sidebar-text-active:#ffffff;
  --sidebar-group:#5a7496;
  --sidebar-border:#2a3f60;
  --header-bg:#1a2840;

  --bg:#f0f2f5;
  --bg-card:#ffffff;
  --border:#dde3ec;
  --text:#1a2840;
  --text-sub:#4a5568;
  --text-muted:#8a9ab5;

  --blue:#2563eb;
  --blue-dark:#1a4fb5;
  --blue-light:#dbeafe;
  --red:#dc2626;
  --red-light:#fee2e2;
  --green:#16a34a;
  --green-light:#dcfce7;
  --yellow:#d97706;
  --yellow-light:#fef3c7;
  --orange:#ea580c;
  --purple:#7c3aed;

  --c-block:#dc2626;
  --c-investigate:#7c3aed;
  --c-monitor:#d97706;
  --c-suppress:#16a34a;

  --header-h:48px;
  --font:-apple-system,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
  --r:6px;
}
html,body,#root{height:100%;width:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c1ccd8;border-radius:3px}
input,select{font-family:var(--font)}
